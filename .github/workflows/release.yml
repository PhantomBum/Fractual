name: Release Fractual

on:
  push:
    branches:
      - "main"
    paths:
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/release.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  windows-release:
    runs-on: windows-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify Fractual
        run: npm run check

      - name: Create version tag
        shell: pwsh
        run: |
          $version = node -p "require('./package.json').version"
          $tag = "v$version"
          git ls-remote --exit-code --tags origin "refs/tags/$tag"
          if ($LASTEXITCODE -ne 0) {
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git tag $tag
            git push origin $tag
          }

      - name: Build installer
        run: npm run dist:win

      - name: Publish release assets
        shell: pwsh
        run: |
          $version = node -p "require('./package.json').version"
          $tag = "v$version"

          $releaseReady = $false
          for ($attempt = 1; $attempt -le 8; $attempt++) {
            gh release view $tag *> $null
            if ($LASTEXITCODE -eq 0) {
              $releaseReady = $true
              break
            }

            gh release create $tag --title "Fractual $version" --notes "Fractual $version for Windows."
            if ($LASTEXITCODE -eq 0) {
              $releaseReady = $true
              break
            }

            $delay = [Math]::Min(30, 5 * $attempt)
            Write-Warning "Release API unavailable (attempt $attempt/8); retrying in $delay seconds."
            Start-Sleep -Seconds $delay
          }

          if (-not $releaseReady) {
            throw "Could not create or find release $tag after 8 attempts."
          }

          $assetsUploaded = $false
          for ($attempt = 1; $attempt -le 8; $attempt++) {
            gh release upload $tag `
              "release/Fractual-Setup-$version.exe" `
              "release/Fractual-Setup-$version.exe.blockmap" `
              "release/latest.yml" `
              --clobber
            if ($LASTEXITCODE -eq 0) {
              $assetsUploaded = $true
              break
            }

            $delay = [Math]::Min(30, 5 * $attempt)
            Write-Warning "Asset upload unavailable (attempt $attempt/8); retrying in $delay seconds."
            Start-Sleep -Seconds $delay
          }

          if (-not $assetsUploaded) {
            throw "Could not upload release assets after 8 attempts."
          }
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
