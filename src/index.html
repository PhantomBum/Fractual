<!doctype html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="color-scheme" content="dark"><title>Fractual</title><link rel="stylesheet" href="../node_modules/@fontsource-variable/inter/index.css"><link rel="stylesheet" href="studio.css"></head>
<body>
  <div class="boot-screen" id="boot-screen" aria-label="Loading Fractual"><div class="boot-lockup"><span class="fractual-icon boot-symbol"><i></i><i></i><i></i><i></i></span><span class="boot-word" aria-hidden="true"><i>f</i><i>r</i><i>a</i><i>c</i><i>t</i><i>u</i><i>a</i><i>l</i></span></div></div>
  <main class="window">
    <header class="topbar">
      <div class="brand"><span class="fractual-icon"><i></i><i></i><i></i><i></i></span><b class="brand-word" aria-label="Fractual"><span aria-hidden="true">f</span><span aria-hidden="true">r</span><span aria-hidden="true">a</span><span aria-hidden="true">c</span><span aria-hidden="true">t</span><span aria-hidden="true">u</span><span aria-hidden="true">a</span><span aria-hidden="true">l</span></b><span class="brand-rule"></span><small id="brand-version">NEW / 2.6</small></div>
      <div class="drag"><div class="topbar-context" aria-hidden="true"><span id="topbar-page">General</span><i></i><small>INTERFACE ONLINE</small></div></div>
      <div class="window-actions"><button id="window-min" aria-label="Minimize"><i></i></button><button id="window-max" aria-label="Maximize"><i></i></button><button id="window-close" aria-label="Close"><i></i></button></div>
    </header>
    <div class="shell">
      <aside class="sidebar">
        <div class="sidebar-head"><span class="nav-label">MENU</span><button class="sidebar-toggle" id="sidebar-toggle" aria-label="Collapse sidebar" title="Collapse sidebar (Ctrl+B)"><i></i><i></i><i></i></button></div>
        <nav>
          <button class="nav active" data-tab="general" data-label="General"><i data-lucide="layout-dashboard"></i><span>General</span></button>
          <button class="nav" data-tab="visual" data-label="Visual"><i data-lucide="eye"></i><span>Visual</span></button>
          <button class="nav" data-tab="misc" data-label="Misc"><i data-lucide="boxes"></i><span>Misc</span></button>
          <button class="nav" data-tab="settings" data-label="Settings"><i data-lucide="settings-2"></i><span>Settings</span></button>
        </nav>
        <div class="side-status"><span class="fractual-icon footer-glyph"><i></i><i></i><i></i><i></i></span><small id="app-version">v2.6</small><i class="footer-line"></i></div>
      </aside>
      <section class="content">
        <canvas class="network-field" id="network-field" aria-hidden="true"></canvas>
        <header class="content-head"><div><h1 id="page-title">General</h1><p>Interface controls</p></div><div class="head-marks" aria-hidden="true"><i></i><i></i><i></i></div></header>

        <section class="page active" data-page="general">
          <div class="subtabs"><button class="active" data-subtab="primary">Primary</button><button data-subtab="secondary">Secondary</button></div>
          <div class="subpage active" data-subpage="primary"><div class="columns">
            <article class="panel"><header><span>MAIN</span><i data-lucide="sliders-horizontal"></i></header><div class="rows">
              <label class="row"><span><b>Enabled</b><small>Placeholder toggle</small></span><button class="toggle on"><i></i></button></label>
              <label class="row"><span><b>Option one</b><small>Placeholder toggle</small></span><button class="toggle"><i></i></button></label>
              <label class="row slider-row"><span><b>Amount</b><output id="amount-value">68</output></span><input id="amount" type="range" min="0" max="100" value="68"></label>
              <label class="row"><span><b>Mode</b><small>Current selection</small></span><select><option>Default</option><option>Alternate</option><option>Minimal</option></select></label>
            </div></article>
            <article class="panel"><header><span>EXTRA</span><i data-lucide="component"></i></header><div class="rows">
              <label class="row"><span><b>Option two</b><small>Placeholder toggle</small></span><button class="toggle on"><i></i></button></label>
              <label class="row"><span><b>Option three</b><small>Placeholder toggle</small></span><button class="toggle"><i></i></button></label>
              <label class="row slider-row"><span><b>Intensity</b><output id="intensity-value">42</output></span><input id="intensity" type="range" min="0" max="100" value="42"></label>
              <button class="wide-button" id="action-button">Run action</button>
            </div></article>
          </div></div>
          <div class="subpage" data-subpage="secondary"><article class="panel full"><header><span>SECONDARY</span><i data-lucide="list-todo"></i></header><div class="rows compact-list"><label class="check-row"><button class="checkbox on"><i data-lucide="check"></i></button><span>Placeholder item one</span><kbd>A</kbd></label><label class="check-row"><button class="checkbox"><i data-lucide="check"></i></button><span>Placeholder item two</span><kbd>B</kbd></label><label class="check-row"><button class="checkbox on"><i data-lucide="check"></i></button><span>Placeholder item three</span><kbd>C</kbd></label></div></article></div>
        </section>

        <section class="page" data-page="visual"><div class="columns">
          <article class="panel"><header><span>DISPLAY</span><i data-lucide="monitor"></i></header><div class="rows"><label class="row"><span><b>Visible</b><small>Placeholder toggle</small></span><button class="toggle on"><i></i></button></label><label class="row"><span><b>Outline</b><small>Placeholder toggle</small></span><button class="toggle on"><i></i></button></label><label class="row"><span><b>Accent</b><small>Interface color</small></span><button class="color-swatch" id="color-swatch"><i></i></button></label><label class="row slider-row"><span><b>Opacity</b><output id="opacity-value">85</output></span><input id="opacity" type="range" min="20" max="100" value="85"></label></div></article>
          <article class="panel preview-panel"><header><span>PREVIEW</span><i data-lucide="scan"></i></header><div class="preview"><div class="preview-box"><i></i><span></span><b></b></div><small>Interactive placeholder</small></div></article>
        </div></section>

        <section class="page" data-page="misc"><div class="columns"><article class="panel"><header><span>OPTIONS</span><i data-lucide="boxes"></i></header><div class="rows"><label class="row"><span><b>Option four</b><small>Placeholder toggle</small></span><button class="toggle"><i></i></button></label><label class="row"><span><b>Option five</b><small>Placeholder toggle</small></span><button class="toggle on"><i></i></button></label><label class="row"><span><b>Selection</b><small>Current choice</small></span><select><option>First</option><option>Second</option><option>Third</option></select></label></div></article><article class="panel"><header><span>KEYS</span><i data-lucide="keyboard"></i></header><div class="rows"><button class="keybind"><span><b>Keybind one</b><small>Click to change</small></span><kbd>INSERT</kbd></button><button class="keybind"><span><b>Keybind two</b><small>Click to change</small></span><kbd>NONE</kbd></button></div></article></div></section>

        <section class="page" data-page="settings"><div class="columns"><article class="panel settings-panel"><header><span>INTERFACE</span><i data-lucide="paintbrush"></i></header><div class="rows"><div class="row generation-row"><span><b>Interface mode</b><small>Switch the entire visual system</small></span><div class="generation-switch" role="radiogroup" aria-label="Interface mode"><button class="active" data-generation-choice="new" role="radio" aria-checked="true"><i data-lucide="sparkles"></i><span>New</span></button><button data-generation-choice="legacy" role="radio" aria-checked="false"><i data-lucide="history"></i><span>Legacy</span></button><i class="generation-track" aria-hidden="true"></i></div></div><button class="row swap-launch" id="ui-swap-trigger"><span><b>Layout style</b><small id="ui-swap-current">Classic frame</small></span><span class="swap-open">Open selector <i data-lucide="arrow-up-right"></i></span></button><button class="row update-row" id="update-action"><span><b>Auto update</b><small id="update-status">Updates check automatically</small></span><span class="update-chip" id="update-chip">AUTO</span></button><label class="row"><span><b>Version</b><small>Interface revision</small></span><select id="version-select"><option value="2.6">2.6 — New mode</option><option value="2.5">2.5 — Update channel</option><option value="2.4">2.4 — Connected</option><option value="2.2">2.2 — Return</option><option value="2.1">2.1 — Toggle study</option><option value="2.0">2.0 — Loader</option><option value="1.9">1.9 — Cover flow</option><option value="1.8">1.8 — Materials</option><option value="1.7">1.7 — Scale</option><option value="1.5">1.5 — Base</option><option value="1.4">1.4 — Contour</option><option value="1.3">1.3 — Studio</option><option value="1.0">1.0 — Original</option></select></label><label class="row"><span><b>Animations</b><small>Interface motion</small></span><button class="toggle on" id="motion-toggle"><i></i></button></label><label class="row"><span><b>Compact mode</b><small>Reduce spacing</small></span><button class="toggle" id="compact-toggle"><i></i></button></label><label class="row slider-row"><span><b>Scale</b><output id="scale-value">100</output></span><input id="scale" type="range" min="85" max="110" value="100"></label></div></article><article class="panel"><header><span>MATERIAL</span><i data-lucide="palette"></i></header><div class="theme-options"><button class="theme active" data-theme="noir"><i></i><span>Noir</span></button><button class="theme" data-theme="graphite2"><i></i><span>Graphite</span></button><button class="theme" data-theme="paper"><i></i><span>Paper</span></button><button class="theme" data-theme="contrast"><i></i><span>Contrast</span></button></div><button class="wide-button" id="reset-button">Reset interface</button></article></div></section>
      </section>
    </div>
  </main>
  <div class="ui-stage" id="ui-stage" aria-hidden="true"><section class="stage-window" role="dialog" aria-modal="true" aria-labelledby="stage-title"><header><span class="stage-logo"><i></i><i></i><i></i></span><button id="stage-close" aria-label="Close interface selector"><i data-lucide="x"></i></button></header><div class="stage-heading"><small>SELECT INTERFACE</small><h2 id="stage-title">Classic</h2></div><div class="coverflow" id="coverflow"><button class="cover-card" data-ui="classic" aria-label="Classic interface"><span class="shot shot-classic"><i></i><b></b><em></em><small></small></span></button><button class="cover-card" data-ui="stellar" aria-label="Stellar interface"><span class="shot shot-stellar"><i></i><b></b><em></em><small></small></span></button><button class="cover-card" data-ui="horizon" aria-label="Horizon interface"><span class="shot shot-horizon"><i></i><b></b><em></em><small></small></span></button><button class="cover-card" data-ui="dock" aria-label="Dock interface"><span class="shot shot-dock"><i></i><b></b><em></em><small></small></span></button></div><footer><button id="stage-prev" aria-label="Previous interface"><i data-lucide="arrow-left"></i></button><div class="stage-center"><div class="stage-dots"><i></i><i></i><i></i><i></i></div><button id="stage-apply"><i data-lucide="check"></i><span>Apply</span></button></div><button id="stage-next" aria-label="Next interface"><i data-lucide="arrow-right"></i></button></footer></section></div>
  <div class="toast" id="toast"><i data-lucide="check"></i><span>Done</span></div>
  <script src="../node_modules/lucide/dist/umd/lucide.js"></script><script src="app.js"></script>
</body></html>
